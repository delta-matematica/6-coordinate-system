<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coordinate System Interactive Guide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#071a33;--navy2:#0b2545;--navy3:#031020;--cyan:#38d9ff;--gold:#f9c74f;--gold2:#f8961e;--green:#22c55e;--red:#ef4444;--soft:rgba(255,255,255,.095);--border:rgba(255,255,255,.18)}
body{width:100vw;height:100vh;background:#020617;display:flex;justify-content:center;align-items:center;font-family:"Segoe UI",Arial,sans-serif;overflow:hidden}
.canvas{width:min(100vw,177.78vh);height:min(56.25vw,100vh);position:relative;overflow:hidden;color:white;background:radial-gradient(circle at 12% 10%,rgba(56,217,255,.22),transparent 25%),radial-gradient(circle at 88% 82%,rgba(249,199,79,.15),transparent 28%),linear-gradient(135deg,var(--navy),var(--navy2) 48%,var(--navy3));box-shadow:0 0 42px rgba(0,0,0,.65)}
.canvas:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle at center,black 52%,transparent 91%);pointer-events:none}
.slide{width:100%;height:100%;display:none;position:absolute;inset:0;padding:4% 6%;z-index:1}.active{display:flex;flex-direction:column}.centered{justify-content:center;align-items:center}
button{border:none;cursor:pointer;font-family:inherit;font-weight:800;letter-spacing:.35px;transition:transform .2s ease,background .2s ease,box-shadow .2s ease}button:hover{transform:translateY(-2px)}button:disabled{cursor:default;transform:none;opacity:.75}
.copyright{position:absolute;bottom:2%;left:0;width:100%;text-align:center;color:rgba(255,255,255,.72);font-size:clamp(.8rem,1.1vw,1.05rem);z-index:3}.pill{display:inline-flex;align-items:center;justify-content:center;padding:10px 24px;border-radius:999px;background:rgba(56,217,255,.16);color:#9beeff;border:1px solid rgba(56,217,255,.45);font-size:clamp(.75rem,1vw,.95rem);text-transform:uppercase;letter-spacing:2px;font-weight:800}.gold-btn{padding:14px 42px;border-radius:999px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#08213f;font-size:clamp(.9rem,1.2vw,1.1rem);box-shadow:0 10px 26px rgba(248,150,30,.32)}.blue-btn{padding:12px 30px;border-radius:999px;background:rgba(14,165,233,.96);color:white;font-size:clamp(.78rem,1.02vw,.95rem)}.finish-btn{padding:10px 22px;border-radius:999px;background:linear-gradient(135deg,var(--green),#16a34a);color:white;font-size:clamp(.74rem,.95vw,.9rem)}
.opening-card{width:82%;height:62%;border-radius:34px;background:rgba(255,255,255,.085);border:1px solid var(--border);box-shadow:0 28px 70px rgba(0,0,0,.36);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4%;text-align:center}.opening-card h1{margin-top:2%;font-size:clamp(3.5rem,6.7vw,6.7rem);line-height:.95;letter-spacing:3px;text-shadow:0 0 24px rgba(56,217,255,.32)}.opening-card h1 span{color:var(--gold)}.opening-card p{margin:2.2% 0 4%;max-width:880px;color:#d9efff;font-size:clamp(1rem,1.42vw,1.35rem);line-height:1.45}.floating-math{position:absolute;color:rgba(255,255,255,.075);font-weight:900;font-family:"Cambria Math","Times New Roman",serif;pointer-events:none}.fm1{top:10%;left:7%;font-size:clamp(2.5rem,5vw,5rem)}.fm2{top:16%;right:8%;font-size:clamp(2.1rem,4vw,4rem)}.fm3{bottom:15%;left:9%;font-size:clamp(2.1rem,4vw,4rem)}.fm4{bottom:18%;right:10%;font-size:clamp(2.3rem,4.6vw,4.7rem)}
.menu-header{text-align:center;margin-top:1%;margin-bottom:3%}.menu-header h1{font-size:clamp(2.25rem,4.4vw,4.2rem);letter-spacing:1px;margin-top:1.2%}.menu-header p{color:#cfe9ff;font-size:clamp(.95rem,1.25vw,1.15rem);margin-top:.8%}.topic-grid{width:90%;height:43%;display:grid;grid-template-columns:repeat(3,1fr);gap:2.4%;margin:0 auto}.topic-card{height:100%;border-radius:30px;background:rgba(255,255,255,.09);border:1px solid var(--border);box-shadow:0 20px 46px rgba(0,0,0,.28);color:white;padding:7%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.topic-card:hover{background:rgba(255,255,255,.135)}.topic-icon{width:clamp(66px,7vw,96px);height:clamp(66px,7vw,96px);border-radius:26px;background:rgba(56,217,255,.14);border:1px solid rgba(56,217,255,.34);display:flex;align-items:center;justify-content:center;margin-bottom:6%;font-size:clamp(1.7rem,2.6vw,2.8rem);color:var(--gold);font-family:"Cambria Math",serif}.topic-card h2{font-size:clamp(1.18rem,1.8vw,1.7rem);margin-bottom:5%}.topic-card p{color:#d7ecff;font-size:clamp(.78rem,1.05vw,1rem);line-height:1.42;font-weight:500}.quad-btn{margin-top:2.4%;padding:10px 34px;border-radius:999px;background:rgba(249,199,79,.16);color:#ffe082;border:1px solid rgba(249,199,79,.42);font-size:clamp(.76rem,1vw,.95rem);letter-spacing:1px}
.lesson-card{width:88%;height:70%;border-radius:34px;background:rgba(255,255,255,.095);border:1px solid var(--border);box-shadow:0 24px 58px rgba(0,0,0,.34);padding:3.4% 4%;display:grid;grid-template-columns:1.1fr 1fr;grid-template-rows:1fr auto;gap:2.5% 3%;align-items:center}.lesson-left{height:100%;display:flex;flex-direction:column;justify-content:center}.lesson-left h2{font-size:clamp(2rem,3.8vw,3.7rem);line-height:1;margin:2.2% 0 3%}.lesson-left p{color:#d9efff;font-size:clamp(.95rem,1.28vw,1.18rem);line-height:1.47}.lesson-actions{grid-column:1/-1;display:flex;justify-content:center;align-items:center;gap:18px;padding-top:.4%}.lesson-actions .gold-btn,.lesson-actions .blue-btn{min-width:190px;text-align:center}.example-box{width:100%;height:100%;min-height:72%;border-radius:28px;background:rgba(2,6,23,.36);border:1px solid rgba(56,217,255,.2);display:flex;flex-direction:column;justify-content:center;padding:4.8%;text-align:center}.showcase-label{color:#9beeff;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;font-size:clamp(.72rem,.9vw,.88rem);margin-bottom:3%}.math-line{font-family:"Cambria Math","STIX Two Math","Times New Roman",serif;font-size:clamp(1.25rem,2.05vw,2rem);font-weight:700;color:#fff;margin:.8% 0}.hint-line{margin-top:2.5%;font-size:clamp(.9rem,1.1vw,1.05rem);color:#ffe082;font-weight:800;line-height:1.35}
.problem-top{height:12%;display:grid;grid-template-columns:1fr auto;align-items:center;gap:20px;z-index:2}.problem-top h2{font-size:clamp(1.65rem,2.7vw,2.7rem);letter-spacing:.4px}.top-actions{display:flex;gap:12px;align-items:center}.progress-wrap{width:100%;height:11px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin:1.1% 0 1.8%;border:1px solid rgba(255,255,255,.1)}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--gold));border-radius:999px;transition:width .25s ease}.problem-layout{width:100%;height:64%;display:grid;grid-template-columns:1.45fr .72fr;gap:2.2%;z-index:2}.question-panel,.choices-panel{border-radius:30px;background:rgba(255,255,255,.095);border:1px solid var(--border);box-shadow:0 20px 48px rgba(0,0,0,.30)}.question-panel{padding:4.4% 3% 3%;position:relative;display:flex;align-items:center;justify-content:center}.question-content{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}.question-text{color:#f8fbff;font-size:clamp(1rem,1.28vw,1.25rem);line-height:1.32;font-weight:650;margin-bottom:1.2%}.choices-panel{padding:5%;display:flex;flex-direction:column;align-items:center;justify-content:center}.choices-panel h3{font-size:clamp(.82rem,1.05vw,1rem);color:#d8ecff;text-align:center;font-weight:800;margin-bottom:7%}.choices-list{width:100%;display:flex;flex-direction:column;align-items:center;gap:10px}.choice-btn{width:92%;min-height:clamp(40px,4.2vw,54px);border-radius:16px;background:rgba(255,255,255,.13);color:white;font-size:clamp(.86rem,1.08vw,1.03rem);text-align:center;border:1px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;padding:3% 4%;line-height:1.22}.choice-btn:hover{background:rgba(255,255,255,.2)}.choice-btn.correct{background:rgba(34,197,94,.86)}.choice-btn.wrong{background:rgba(239,68,68,.84)}.math-choice{font-family:"Cambria Math","STIX Two Math","Times New Roman",serif;font-size:1.08em;font-weight:700}.feedback{height:7%;margin-top:.8%;color:#ffe082;font-size:clamp(.95rem,1.28vw,1.2rem);font-weight:900;display:flex;align-items:center;justify-content:center;text-align:center;z-index:2}.question-buttons{position:absolute;bottom:7.2%;left:6%;right:6%;display:flex;justify-content:center;flex-wrap:wrap;gap:7px;z-index:2}.q-btn{width:clamp(30px,2.7vw,40px);height:clamp(30px,2.7vw,40px);border-radius:50%;background:rgba(255,255,255,.13);color:white;border:1px solid rgba(255,255,255,.18);font-size:clamp(.7rem,.9vw,.85rem)}.q-btn.active-q{background:var(--gold);color:#08213f}.q-btn.answered{border-color:rgba(34,197,94,.95);box-shadow:0 0 0 2px rgba(34,197,94,.22)}
.grid-wrap{width:min(58vh,520px);height:min(58vh,520px);max-width:92%;max-height:92%;position:relative}.coord-grid{width:100%;height:100%;border-radius:20px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.18);overflow:visible}.grid-point{fill:#f9c74f;stroke:white;stroke-width:1.5}.identify-point{fill:#f9c74f;stroke:white;stroke-width:3;filter:drop-shadow(0 0 8px rgba(249,199,79,.85))}.point-label{fill:#ffe082;font-size:22px;font-weight:900;font-family:"Segoe UI",Arial,sans-serif}.grid-point.blue{fill:#38d9ff}.grid-point.green{fill:#22c55e}.click-dot{fill:rgba(255,255,255,.001);cursor:pointer;touch-action:none}.click-dot:hover{fill:rgba(249,199,79,.28)}.plot-selected{fill:#f9c74f;stroke:white;stroke-width:3;filter:drop-shadow(0 0 8px rgba(249,199,79,.85));pointer-events:none}.plot-selected.wrong{fill:#ef4444;filter:drop-shadow(0 0 8px rgba(239,68,68,.85))}.plot-selected-ring{fill:none;stroke:#fff;stroke-width:2;opacity:.95;pointer-events:none}.axis-label{fill:#d9efff;font-size:11px;font-weight:700;font-family:"Segoe UI",Arial}.axis-title{fill:#9beeff;font-size:13px;font-weight:900;font-family:"Segoe UI",Arial}.shape-line{stroke:#f9c74f;stroke-width:4;fill:rgba(249,199,79,.17);stroke-linejoin:round}.old-line{stroke:#94a3b8;stroke-width:4;stroke-dasharray:7 6}.new-line{stroke:#22c55e;stroke-width:4}.vertex-label{fill:#ffffff;font-size:13px;font-weight:900;font-family:"Cambria Math",serif}.missing-vertex-dot{fill:#ef4444;stroke:#fff;stroke-width:3;filter:drop-shadow(0 0 8px rgba(239,68,68,.85))}.missing-vertex-label{fill:#fff;font-size:24px;font-weight:900;font-family:"Segoe UI",Arial,sans-serif;text-anchor:middle;dominant-baseline:middle;pointer-events:none}.quad-grid{width:min(60vh,500px);height:min(60vh,500px)}.quad-note{font-size:clamp(.92rem,1.12vw,1.05rem);color:#d9efff;line-height:1.45;text-align:left;margin-top:2%;}.quad-note strong{color:#ffe082}.small-example-grid{width:100%;display:flex;justify-content:center;align-items:center;min-height:250px}
.result-card{width:76%;min-height:58%;border-radius:34px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);box-shadow:0 24px 60px rgba(0,0,0,.36);padding:5%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:2}.result-card h2{font-size:clamp(2.1rem,3.9vw,3.8rem);margin-bottom:2%}.score-circle{width:clamp(145px,15vw,210px);height:clamp(145px,15vw,210px);border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#08213f;display:flex;align-items:center;justify-content:center;font-size:clamp(2rem,3.7vw,3.5rem);font-weight:900;margin:2.5% 0;box-shadow:0 16px 35px rgba(248,150,30,.35)}.result-message{font-size:clamp(1rem,1.35vw,1.25rem);color:#d8ecff;line-height:1.45;margin-bottom:3.5%}.result-actions{display:flex;gap:18px;justify-content:center;flex-wrap:wrap}



/* Coordinate System Practice Test Menu and Screens */
.decimal-page-card{width:94%;height:88%;border-radius:34px;background:rgba(255,255,255,.095);border:1px solid var(--border);box-shadow:0 24px 58px rgba(0,0,0,.34);padding:1.45% 3.2%;display:grid;grid-template-rows:auto auto 1fr auto;gap:1.05%;z-index:2}
.decimal-header{text-align:center}.decimal-header h2{font-size:clamp(1.75rem,3vw,2.8rem);line-height:1;margin-top:.4%}.decimal-header p{color:#d9efff;font-size:clamp(.72rem,.9vw,.86rem);font-weight:700;margin-top:.35%}
.student-select-row{width:86%;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:2%;align-items:center}.select-card{background:rgba(2,6,23,.28);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:9px 13px}.select-card label{display:block;color:#9beeff;font-size:clamp(.68rem,.82vw,.8rem);font-weight:900;letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}.select-card select{width:100%;padding:8px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);color:white;font-size:clamp(.78rem,.95vw,.9rem);font-weight:800;outline:none}.select-card option{color:#071a33}.student-reminder{text-align:center;color:#ffe082;font-size:clamp(.72rem,.88vw,.84rem);font-weight:800;margin-top:.25%}

.decimal-table-wrap{background:rgba(2,6,23,.28);border:1px solid rgba(255,255,255,.14);border-radius:22px;overflow:hidden;min-height:0}.decimal-table{width:100%;height:100%;border-collapse:collapse;table-layout:fixed}.decimal-table th{background:rgba(56,217,255,.16);color:#9beeff;text-align:center;padding:8px 14px;font-size:clamp(.74rem,.9vw,.86rem);letter-spacing:.6px}.decimal-table td{padding:6px 14px;border-top:1px solid rgba(255,255,255,.1);color:#e8f6ff;text-align:center;font-size:clamp(.74rem,.9vw,.86rem);font-weight:750}.decimal-table tbody tr{height:18%;background:rgba(255,255,255,.045)}.decimal-table tbody tr:hover{background:rgba(255,255,255,.085)}
.decimal-open-btn{width:88%;padding:7px 16px;border-radius:999px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#08213f;font-size:clamp(.78rem,.95vw,.9rem)}.decimal-open-btn.completed{background:rgba(255,255,255,.16);color:#cbd5e1;box-shadow:none}.status-complete{color:#22c55e;font-weight:900}.status-incomplete{color:#ffe082;font-weight:900}.decimal-actions{display:flex;justify-content:center;gap:16px;align-items:center}
.decimal-test-layout{width:100%;height:64%;display:grid;grid-template-columns:1.45fr .72fr;gap:2.2%;z-index:2}.decimal-question-panel,.decimal-choices-panel{border-radius:30px;background:rgba(255,255,255,.095);border:1px solid var(--border);box-shadow:0 20px 48px rgba(0,0,0,.30)}.decimal-question-panel{padding:5%;display:flex;align-items:center;justify-content:center;text-align:center}.decimal-question-text{color:#f8fbff;font-size:clamp(1rem,1.28vw,1.22rem);line-height:1.32;font-weight:650}.decimal-question-extra{margin-top:1.5%;font-family:"Cambria Math","STIX Two Math","Times New Roman",serif;font-size:clamp(1.1rem,1.8vw,1.7rem);color:#ffe082;font-weight:800;display:flex;justify-content:center;align-items:center;min-height:280px}.decimal-question-extra .grid-wrap{width:min(47vh,380px);height:min(47vh,380px)}.decimal-choices-panel{padding:5%;display:flex;flex-direction:column;align-items:center;justify-content:center}.decimal-choices-panel h3{font-size:clamp(.82rem,1.05vw,1rem);color:#d8ecff;text-align:center;font-weight:800;margin-bottom:7%}.decimal-question-buttons{position:absolute;bottom:7.2%;left:6%;right:6%;display:flex;justify-content:center;flex-wrap:wrap;gap:7px;z-index:2}.decimal-q-btn{width:clamp(30px,2.7vw,40px);height:clamp(30px,2.7vw,40px);border-radius:50%;background:rgba(255,255,255,.13);color:white;border:1px solid rgba(255,255,255,.18);font-size:clamp(.7rem,.9vw,.85rem)}.decimal-q-btn.active-q{background:var(--gold);color:#08213f}.decimal-q-btn.answered{border-color:rgba(34,197,94,.95);box-shadow:0 0 0 2px rgba(34,197,94,.22)}
#decimalProceedMessage{font-size:clamp(1.05rem,1.45vw,1.35rem);color:#ffe082;font-weight:900;margin:1.5% 0 2%}.hidden{display:none!important}



/* Readable Practice Test menu: larger labels/buttons while keeping Tests 1–5 visible */
#decimalPracticeMenu{padding:1.4% 4.2%;}
#decimalPracticeMenu .decimal-page-card{
  width:96%;
  height:92%;
  padding:1.4% 2.8% 1.2%;
  grid-template-rows:auto auto minmax(0,1fr) auto;
  gap:.85%;
}
#decimalPracticeMenu .pill{
  padding:8px 22px;
  font-size:clamp(.78rem,.95vw,.9rem);
}
#decimalPracticeMenu .decimal-header h2{
  font-size:clamp(2rem,3.1vw,3rem);
  margin-top:.35%;
  line-height:.95;
}
#decimalPracticeMenu .decimal-header p{
  font-size:clamp(.78rem,1vw,.96rem);
  line-height:1.18;
  margin: .35% auto 0;
  max-width: 980px;
}
#decimalPracticeMenu .student-select-row{
  width:94%;
  gap:2%;
}
#decimalPracticeMenu .select-card{
  padding:9px 14px;
  border-radius:18px;
}
#decimalPracticeMenu .select-card label{
  font-size:clamp(.8rem,1vw,.95rem);
  margin-bottom:5px;
}
#decimalPracticeMenu .select-card select{
  padding:9px 12px;
  border-radius:12px;
  font-size:clamp(.9rem,1.12vw,1.05rem);
}
#decimalPracticeMenu .decimal-table-wrap{
  min-height:0;
  height:100%;
  border-radius:20px;
}
#decimalPracticeMenu .decimal-table{
  height:100%;
  table-layout:fixed;
}
#decimalPracticeMenu .decimal-table th{
